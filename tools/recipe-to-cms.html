<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holistic Bravo - Recipe to CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f13;
            color: #e4e4e7;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a24, #252535);
            border-bottom: 1px solid rgba(199,149,240,0.2);
            padding: 1.25rem 2rem;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #C795F0;
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.25rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }
        .drop-zone {
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            background: #1a1a24;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #C795F0;
            background: rgba(199,149,240,0.05);
        }
        .drop-zone p { color: #888; font-size: 0.95rem; }
        .drop-zone .big { font-size: 1.1rem; color: #ccc; margin-bottom: 0.5rem; }
        input[type="file"] { display: none; }

        .recipe-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #C795F0;
            margin-bottom: 1.5rem;
        }
        .field-card {
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .field-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .field-header:hover { background: #16161f; }
        .field-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #C795F0;
        }
        .field-hint {
            font-size: 0.75rem;
            color: #666;
            margin-left: 0.75rem;
        }
        .field-actions { display: flex; gap: 0.5rem; align-items: center; }
        .copy-btn {
            padding: 0.35rem 0.9rem;
            background: linear-gradient(135deg, #C795F0, #a070d0);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(199,149,240,0.3); }
        .copy-btn.copied { background: linear-gradient(135deg, #7FE3B1, #50b080); }
        .toggle-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            transition: transform 0.2s;
        }
        .toggle-btn.open { transform: rotate(90deg); }
        .field-content {
            display: none;
            padding: 0 1rem 1rem;
        }
        .field-content.open { display: block; }
        .field-text {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-word;
            background: #12121a;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #222;
            max-height: 300px;
            overflow-y: auto;
        }
        .field-preview {
            margin-top: 0.75rem;
            background: #fff;
            color: #2D2D2D;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.7;
        }
        .field-preview strong { font-weight: 700; }
        .field-preview em { font-style: italic; }
        .field-preview ul, .field-preview ol { padding-left: 1.5rem; margin: 0.5rem 0; }
        .field-preview li { margin-bottom: 0.25rem; }
        .field-preview p { margin: 0 0 0.5rem 0; }
        .preview-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #666;
            margin-bottom: 0.35rem;
        }
        .section-divider {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            padding: 0.75rem 0 0.35rem;
            margin-top: 0.5rem;
        }
        .copy-all-btn {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #C795F0, #a070d0);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        .copy-all-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(199,149,240,0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Recipe to CMS</h1>
        <div class="subtitle">Load a recipe .md file, then copy each field into Framer CMS. Newlines are preserved.</div>
    </div>

    <div class="container">
        <div class="drop-zone" id="drop-zone">
            <p class="big">Drop a recipe .md file here</p>
            <p>or click to browse</p>
            <input type="file" id="file-input" accept=".md,.txt">
        </div>

        <div id="fields-container" class="hidden"></div>
    </div>

    <script>
        // ============================================================
        // FILE LOADING
        // ============================================================
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const fields = parseRecipe(content);
                renderFields(fields);
            };
            reader.readAsText(file);
        }

        // ============================================================
        // PARSE RECIPE .MD FILE
        // ============================================================
        function parseRecipe(content) {
            const fields = {};
            const sections = content.split(/^={3,}$/m);

            let currentField = null;
            for (const section of sections) {
                const trimmed = section.trim();
                const fieldMatch = trimmed.match(/^FIELD:\s*(\S+)$/m);
                if (fieldMatch) {
                    currentField = fieldMatch[1];
                } else if (currentField) {
                    fields[currentField] = trimmed;
                    currentField = null;
                }
            }

            return fields;
        }

        // ============================================================
        // FIELD DISPLAY ORDER AND LABELS
        // ============================================================
        const fieldConfig = [
            { key: 'title', label: 'Name', hint: 'Text (single line)', group: 'Core Fields' },
            { key: 'slug', label: 'Slug', hint: 'Auto-generated URL path' },
            { key: 'createdDate', label: 'Created Date', hint: 'Date' },
            { key: 'updatedDate', label: 'Updated Date', hint: 'Date' },
            { key: 'shortDescription', label: 'Short Description', hint: 'Text (multi-line)' },
            { key: 'introduction', label: 'Introduction', hint: 'Plain Text (multi-line)', group: 'Blog Content' },
            { key: 'whyYoullLove', label: "Why You'll Love This", hint: 'Plain Text (multi-line)' },
            { key: 'tips', label: 'Tips', hint: 'Plain Text (multi-line)' },
            { key: 'ingredientsOverview', label: 'Ingredients Overview', hint: 'Plain Text (multi-line)' },
            { key: 'instructionsOverview', label: 'Instructions Overview', hint: 'Plain Text (multi-line)' },
            { key: 'faq', label: 'FAQ', hint: 'Plain Text (multi-line)' },
            { key: 'relatedRecipes', label: 'Related Recipes', hint: 'Comma-separated names' },
            { key: 'author', label: 'Author', hint: 'Text (single line)', group: 'Recipe Card' },
            { key: 'prepTime', label: 'Prep Time', hint: 'Text' },
            { key: 'cookTime', label: 'Cook Time', hint: 'Text' },
            { key: 'totalTime', label: 'Total Time', hint: 'Text' },
            { key: 'servings', label: 'Servings', hint: 'Text' },
            { key: 'calories', label: 'Calories', hint: 'Text' },
            { key: 'diet', label: 'Diet', hint: 'Text' },
            { key: 'category', label: 'Category', hint: 'Text' },
            { key: 'cuisine', label: 'Cuisine', hint: 'Text' },
            { key: 'recipeCardIngredients', label: 'Card Ingredients', hint: 'Plain Text (multi-line)' },
            { key: 'recipeCardInstructions', label: 'Card Instructions', hint: 'Plain Text (multi-line)' },
            { key: 'nutrition', label: 'Nutrition', hint: 'Plain Text (multi-line)' },
            { key: 'sourceUrl', label: 'Source URL', hint: 'Link' },
        ];

        // ============================================================
        // RENDER FIELDS
        // ============================================================
        function renderFields(fields) {
            const container = document.getElementById('fields-container');
            container.innerHTML = '';
            container.classList.remove('hidden');

            // Recipe title
            if (fields.title) {
                const h2 = document.createElement('h2');
                h2.className = 'recipe-name';
                h2.textContent = fields.title;
                container.appendChild(h2);
            }

            let currentGroup = null;

            for (const config of fieldConfig) {
                const value = fields[config.key];
                if (!value && !['sourceUrl'].includes(config.key)) continue;

                // Group divider
                if (config.group && config.group !== currentGroup) {
                    currentGroup = config.group;
                    const divider = document.createElement('div');
                    divider.className = 'section-divider';
                    divider.textContent = config.group;
                    container.appendChild(divider);
                }

                const card = document.createElement('div');
                card.className = 'field-card';

                const isMultiLine = (value || '').includes('\n');
                const displayValue = value || '';

                card.innerHTML = `
                    <div class="field-header">
                        <div style="display:flex;align-items:center">
                            <span class="field-label">${config.label}</span>
                            <span class="field-hint">${config.hint}</span>
                        </div>
                        <div class="field-actions">
                            <button class="copy-btn" data-field="${config.key}">Copy</button>
                            <button class="toggle-btn" data-field="${config.key}">&#9654;</button>
                        </div>
                    </div>
                    <div class="field-content" id="content-${config.key}">
                        <div class="field-text">${escapeHtml(displayValue)}</div>
                        ${isMultiLine ? `
                        <div style="margin-top:0.75rem">
                            <div class="preview-label">Preview</div>
                            <div class="field-preview">${renderPreview(displayValue)}</div>
                        </div>` : ''}
                    </div>
                `;

                // Copy button
                card.querySelector('.copy-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyField(displayValue, e.target);
                });

                // Toggle content
                card.querySelector('.field-header').addEventListener('click', () => {
                    const content = card.querySelector('.field-content');
                    const toggle = card.querySelector('.toggle-btn');
                    content.classList.toggle('open');
                    toggle.classList.toggle('open');
                });

                container.appendChild(card);
            }
        }

        // ============================================================
        // COPY WITH PRESERVED NEWLINES
        // ============================================================
        function copyField(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // ============================================================
        // PREVIEW RENDERING (matches Framer component parser)
        // ============================================================
        function renderPreview(text) {
            if (!text) return '';
            const lines = text.split('\n');
            let html = '';
            let i = 0;

            while (i < lines.length) {
                const line = lines[i].trim();
                if (!line) { i++; continue; }

                if (/^\d+\.\s/.test(line)) {
                    html += '<ol>';
                    while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
                        html += '<li>' + renderInline(lines[i].trim().replace(/^\d+\.\s/, '')) + '</li>';
                        i++;
                    }
                    html += '</ol>';
                    continue;
                }

                if (line.startsWith('- ') || line.startsWith('* ')) {
                    html += '<ul>';
                    while (i < lines.length && (lines[i].trim().startsWith('- ') || lines[i].trim().startsWith('* '))) {
                        html += '<li>' + renderInline(lines[i].trim().replace(/^[-*]\s/, '')) + '</li>';
                        i++;
                    }
                    html += '</ul>';
                    continue;
                }

                html += '<p>' + renderInline(line) + '</p>';
                i++;
            }
            return html;
        }

        function renderInline(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/(?<!\*)\*(?!\*)(.+?)\*(?!\*)/g, '<em>$1</em>')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="color:#C795F0">$1</a>');
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
